<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checklist Viaje de Egresados</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="contenedor">

    <header>
        <h1>🧳 kit Viaje de Egresados</h1>
    
    </header>

    <section class="card">
        <h2> Fiestas Temáticas</h2>

        <label><input type="checkbox">  Blanco y Negro</label>
        <label><input type="checkbox">  Rojo y Blanco</label>
        <label><input type="checkbox">  Disfraz: Max (Hijo de Goofy)</label>
        <label><input type="checkbox">  Flúor</label>
        <label><input type="checkbox">  Bizarra</label>
        <label><input type="checkbox">  Estudiantil</label>
        <label><input type="checkbox"> Argentina</label>
        <label><input type="checkbox"> Vela (Gala)</label>

    </section>

    <section class="card">
        <h2> Cosas Personales (Bolsito de Mano)</h2>

        <label><input type="checkbox"> Desodorante</label>
        <label><input type="checkbox"> Perfume</label>
        <label><input type="checkbox"> Jabón</label>
        <label><input type="checkbox"> Cepillo de dientes</label>
        <label><input type="checkbox"> Pasta dental</label>
        <label><input type="checkbox"> Shampoo</label>
        <label><input type="checkbox"> Peine</label>
        <label><input type="checkbox"> Corta uñas</label>
        <label><input type="checkbox"> Cargador de celular</label>
        <label><input type="checkbox"> Documento</label>
        <label><input type="checkbox"> Crema de cacao</label>
        <label><input type="checkbox"> Hilo dental</label>

    </section>

    <section class="card">
        <h2> Ropa del Día a Día</h2>

        <label><input type="checkbox"> Camisetas térmicas (5 o 6)</label>
        <label><input type="checkbox"> Calzas térmicas (5 o 6)</label>
        <label><input type="checkbox"> Calzoncillos (9)</label>
        <label><input type="checkbox"> Medias (12)</label>
        <label><input type="checkbox"> Buzos (2 - Opcional)</label>
        <label><input type="checkbox"> Ropa cómoda para hotel</label>
        <label><input type="checkbox"> Ropa para dormir</label>
        <label><input type="checkbox"> Guantes térmicos</label>
        <label><input type="checkbox"> Anteojos de sol</label>
        <label><input type="checkbox"> Gorro</label>
        <label><input type="checkbox"> Zapatillas de repuesto</label>
        <label><input type="checkbox"> Vaso térmico</label>
        <label><input type="checkbox"> Cuellito de invierno</label>

    </section>

    <section class="card">
        <h2> Accesorios</h2>

        <label><input type="checkbox"> Anteojos de fiesta</label>
        <label><input type="checkbox"> Cadenitas</label>
        <label><input type="checkbox"> Pulseras</label>

    </section>


</div>
<script src="script.js"></script>
</body>
</html>
